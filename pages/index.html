<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Avaliação — FAETERJ</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-num { font-size: 22px; font-weight: 700; color: #1a73e8; }
    .stat-lbl { font-size: 11px; color: #888; margin-top: 2px; }
    @media (max-width: 600px) {
      .stats-row { gap: 6px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- BOAS-VINDAS -->
  <div class="hero-inicio">
    <div class="hero-texto">
      <div class="hero-eyebrow">Sistema de Avaliação</div>
      <h1 class="hero-titulo" id="hero-titulo">Bem-vindo(a) de volta!</h1>
      <p class="hero-desc">Corrija provas objetivas e trabalhos por rubrica, cadastre alunos e equipe, e acompanhe
        tudo pelo histórico de avaliações.</p>
    </div>
  </div>

  <!-- ESTATÍSTICAS RÁPIDAS -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-num" id="total-aval">0</div><div class="stat-lbl">Avaliações salvas</div></div>
    <div class="stat-card"><div class="stat-num" id="total-provas">0</div><div class="stat-lbl">Provas corrigidas</div></div>
    <div class="stat-card"><div class="stat-num" id="total-trab">0</div><div class="stat-lbl">Trabalhos avaliados</div></div>
  </div>

</div>

<script src="../js/utils.js"></script>
<script src="../js/cadastro.js"></script>
<script src="../js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const acesso = authProtegerPagina({});
    if (!acesso) return;
    authRenderSidebar('index.html');
    const primeiroNome = acesso.sessao.nome.trim().split(/\s+/)[0];
    document.getElementById('hero-titulo').textContent = `Bem-vindo(a) de volta, ${primeiroNome}!`;

    const hist = getHistorico();
    const provas = hist.filter(h => h.tipo === 'prova').length;
    const trabalhos = hist.filter(h => h.tipo === 'trabalho').length;

    document.getElementById('total-aval').textContent  = hist.length;
    document.getElementById('total-provas').textContent = provas;
    document.getElementById('total-trab').textContent   = trabalhos;
  });
</script>
</body>
</html>
